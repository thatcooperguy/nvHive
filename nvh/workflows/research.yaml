name: Research Pipeline
description: Deep research with multiple sources and synthesis
steps:
  - name: initial_research
    action: poll
    prompt: "{{input}}"
    save_as: perspectives

  - name: deep_dive
    action: convene
    prompt: "Based on these perspectives, provide a deeper analysis:\n\n{{perspectives}}\n\nOriginal question: {{input}}"
    cabinet: full_board
    save_as: analysis

  - name: summary
    action: ask
    prompt: "Create an executive summary with key findings and recommendations:\n\n{{analysis}}"
    save_as: summary
