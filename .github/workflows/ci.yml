name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check nvh/ tests/ --select E,F,W --ignore E501,E402,E701,E741,F541,F841,F823,F401
      - name: Test
        run: python -m pytest tests/ -v --tb=short
      - name: Coverage
        run: python -m pytest tests/ --cov=nvh --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Build package
        run: python -m build
      - name: Verify wheel
        run: pip install dist/*.whl && nvh version
